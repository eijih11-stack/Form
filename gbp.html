<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googleマップ ビジネスプロフィール作成代行</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    label span.required {
      color: #e53935;
      margin-left: 4px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: #1a73e8;
      background: #fff;
    }

    input::placeholder {
      color: #bbb;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      pointer-events: none;
      font-size: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }

    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }

    .success-msg {
      display: none;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      font-size: 15px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📍</div>
      <div class="logo-text">
        <h1>Googleマップ<br>ビジネスプロフィール作成代行</h1>
        <p>必要事項をご入力のうえ、送信してください</p>
      </div>
    </div>
    <div class="divider"></div>

    <form id="contact-form" action="https://formspree.io/f/xqejvokb" method="POST">

      <div class="field">
        <label for="store_name">店舗名<span class="required">*</span></label>
        <input
          type="text"
          id="store_name"
          name="店舗名"
          placeholder="例：カフェ〇〇 渋谷店"
          required
        >
      </div>

      <div class="field">
        <label for="phone">電話番号<span class="required">*</span></label>
        <input
          type="tel"
          id="phone"
          name="電話番号"
          placeholder="例：090-1234-5678"
          required
        >
      </div>

      <div class="field">
        <label for="call_time">お電話に出やすい時間帯<span class="required">*</span></label>
        <div class="select-wrapper">
          <select id="call_time" name="電話に出やすい時間帯" required>
            <option value="" disabled selected>時間帯を選択してください</option>
            <option value="9:00〜11:00">9:00〜11:00</option>
            <option value="11:00〜13:00">11:00〜13:00</option>
            <option value="13:00〜15:00">13:00〜15:00</option>
            <option value="15:00〜17:00">15:00〜17:00</option>
            <option value="17:00〜19:00">17:00〜19:00</option>
            <option value="19:00〜21:00">19:00〜21:00</option>
            <option value="いつでも可">いつでも可</option>
          </select>
        </div>
      </div>

      <input type="hidden" name="_subject" value="【Googleマップ代行】新規お申し込み">
      <input type="hidden" name="_replyto" value="">

      <button type="submit" class="submit-btn">送信する</button>
    </form>

    <div class="success-msg" id="success-msg">
      ✅ 送信が完了しました！<br>担当者より最短1営業日以内にお電話が来ますのでお待ちください。<br>※お電話は5分ほどで完了します
    </div>

    <p class="note">ご入力いただいた情報は、サービス提供目的のみに使用いたします。</p>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        alert('送信に失敗しました。時間をおいて再度お試しください。');
      }
    });
  </script>
</body>
</html>
