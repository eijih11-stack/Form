<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口コミURL 送信フォーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f97316 0%, #b45309 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      margin: auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #f97316, #b45309);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin-bottom: 28px;
    }

    .counter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .counter-bar label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .counter-bar label span.required {
      color: #e53935;
      margin-left: 4px;
    }

    .count-badge {
      background: #fff7ed;
      color: #f97316;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #fed7aa;
    }

    #url-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .url-num {
      font-size: 13px;
      color: #aaa;
      font-weight: 600;
      min-width: 24px;
      text-align: right;
    }

    .url-input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .url-input:focus {
      border-color: #f97316;
      background: #fff;
    }

    .url-input::placeholder { color: #bbb; }

    .remove-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: #fee2e2;
      color: #ef4444;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .remove-btn:hover { background: #fecaca; }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: #fff7ed;
      color: #f97316;
      border: 2px dashed #fed7aa;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #ffedd5; }

    .add-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f97316, #b45309);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }

    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }

    .success-msg {
      display: none;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      font-size: 15px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⭐</div>
      <div class="logo-text">
        <h1>口コミURL 送信フォーム</h1>
        <p>URLを1〜100件入力して送信してください</p>
      </div>
    </div>
    <div class="divider"></div>

    <form id="review-form" action="https://formspree.io/f/mdajrvoe" method="POST">

      <div class="counter-bar">
        <label>口コミURL<span class="required">*</span></label>
        <span class="count-badge" id="count-badge">1 件</span>
      </div>

      <div id="url-list">
        <div class="url-row">
          <span class="url-num">1</span>
          <input
            class="url-input"
            type="url"
            name="口コミURL_1"
            placeholder="https://maps.google.com/..."
            required
          >
        </div>
      </div>

      <button type="button" class="add-btn" id="add-btn">＋ URLを追加する（最大100件）</button>

      <input type="hidden" name="_subject" value="【口コミURL】新規送信">

      <button type="submit" class="submit-btn">送信する</button>
    </form>

    <div class="success-msg" id="success-msg">
      ✅ 送信が完了しました！<br>チームが削除を随時進めますので引き続きよろしくお願いいたします。
    </div>

    <p class="note">ご入力いただいた情報は、サービス提供目的のみに使用いたします。</p>
  </div>

  <script>
    const urlList = document.getElementById('url-list');
    const addBtn = document.getElementById('add-btn');
    const countBadge = document.getElementById('count-badge');
    const MAX = 100;

    function updateState() {
      const rows = urlList.querySelectorAll('.url-row');
      const count = rows.length;
      countBadge.textContent = count + ' 件';
      addBtn.disabled = count >= MAX;

      rows.forEach((row, i) => {
        row.querySelector('.url-num').textContent = i + 1;
        const input = row.querySelector('.url-input');
        input.name = '口コミURL_' + (i + 1);
        if (i === 0) {
          input.required = true;
          const btn = row.querySelector('.remove-btn');
          if (btn) btn.style.visibility = count === 1 ? 'hidden' : 'visible';
        }
      });
    }

    addBtn.addEventListener('click', function() {
      const rows = urlList.querySelectorAll('.url-row');
      if (rows.length >= MAX) return;

      const row = document.createElement('div');
      row.className = 'url-row';
      row.innerHTML = `
        <span class="url-num"></span>
        <input class="url-input" type="url" placeholder="https://maps.google.com/...">
        <button type="button" class="remove-btn" title="削除">✕</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', function() {
        row.remove();
        updateState();
      });
      urlList.appendChild(row);
      updateState();
      row.querySelector('.url-input').focus();
    });

    const form = document.getElementById('review-form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const inputs = urlList.querySelectorAll('.url-input');
      const filled = Array.from(inputs).filter(i => i.value.trim() !== '');
      if (filled.length === 0) {
        alert('URLを1件以上入力してください。');
        return;
      }

      const formData = new FormData();
      formData.append('_subject', '【口コミURL】新規送信（' + filled.length + '件）');
      filled.forEach((input, i) => {
        formData.append('口コミURL_' + (i + 1), input.value.trim());
      });

      const res = await fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        alert('送信に失敗しました。時間をおいて再度お試しください。');
      }
    });

    updateState();
  </script>
</body>
</html>
